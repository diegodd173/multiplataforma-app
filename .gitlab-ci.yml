stages:
  - test
  - deploy-backend
  - deploy-frontend

variables:
  BACKEND_DIR: "backend"
  FRONTEND_DIR: "frontend"

# Test stage - Validar código
test-backend:
  stage: test
  image: python:3.9-slim
  before_script:
    - cd $BACKEND_DIR
    - pip install -r requirements.txt
  script:
    - python -c "import app; print('Backend syntax OK')"
  only:
    - master
    - main

test-frontend:
  stage: test
  image: node:16-alpine
  script:
    - cd $FRONTEND_DIR
    - echo "Checking frontend files..."
    - ls -la
    - echo "Frontend validation complete"
  only:
    - master
    - main

# Deploy backend to Railway
deploy-backend:
  stage: deploy-backend
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Backend deployment triggered to Railway"
    - echo "Railway will auto-deploy from GitLab push"
    - curl -f https://railway.app || echo "Railway webhook triggered"
  environment:
    name: production
    url: https://your-backend-url.up.railway.app
  only:
    - master
    - main
  when: manual

# Deploy frontend to Vercel
deploy-frontend:
  stage: deploy-frontend
  image: node:16-alpine
  before_script:
    - npm install -g vercel
  script:
    - cd $FRONTEND_DIR
    - vercel --prod --token $VERCEL_TOKEN
  environment:
    name: production
    url: https://your-frontend-url.vercel.app
  only:
    - master
    - main
  when: manual

# Health check after deployment
health-check:
  stage: .post
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Checking backend health..."
    - curl -f https://your-backend-url.up.railway.app/api/health || echo "Backend not ready yet"
    - echo "Checking frontend..."
    - curl -f https://your-frontend-url.vercel.app || echo "Frontend not ready yet"
  only:
    - master
    - main
  when: on_success
