[build]
  # Directorio base para el build
  base = ""
  # Directorio que contiene los archivos para publicar
  publish = "frontend"
  # Comando de build (no necesitamos build para archivos estáticos)
  command = ""

# Configuración de redirección para SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers para seguridad y rendimiento
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers para archivos estáticos
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
